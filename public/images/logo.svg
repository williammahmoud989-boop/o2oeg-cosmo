<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <!-- Rose gradient -->
    <linearGradient id="roseG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF1493"/>
      <stop offset="100%" style="stop-color:#C2185B"/>
    </linearGradient>
    <!-- Gold gradient -->
    <linearGradient id="goldG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#E65100"/>
    </linearGradient>
    <!-- Dark wine for "2" -->
    <linearGradient id="darkG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A0020"/>
      <stop offset="100%" style="stop-color:#1A0010"/>
    </linearGradient>
    <!-- Stroke style for sketch feel -->
    <filter id="sk">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- ============================================= -->
  <!-- BASELINE                                      -->
  <!-- ============================================= -->
  <line x1="10" y1="190" x2="590" y2="190"
        stroke="url(#darkG)" stroke-width="3" stroke-linecap="round"
        opacity="0.4"/>

  <!-- ============================================= -->
  <!-- LEFT STICK FIGURE (Female - Rose)             -->
  <!-- ============================================= -->

  <!-- HEAD -->
  <circle cx="82" cy="42" r="26"
          fill="none" stroke="url(#roseG)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- HAIR - curly scribbles on top -->
  <path d="M62 30 Q68 18 75 24 Q80 12 87 22 Q93 10 100 22"
        stroke="url(#roseG)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- FACE - left looking eyes -->
  <ellipse cx="72" cy="40" rx="4" ry="4.5" fill="url(#roseG)" opacity="0.9"/>
  <ellipse cx="88" cy="40" rx="4" ry="4.5" fill="url(#roseG)" opacity="0.9"/>
  <!-- Pupils looking sideways -->
  <circle cx="70" cy="41" r="2" fill="#1A0010"/>
  <circle cx="86" cy="41" r="2" fill="#1A0010"/>
  <!-- Eyebrows (smirking) -->
  <path d="M67 33 Q72 30 77 32" stroke="#C2185B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M83 32 Q88 29 93 31" stroke="#C2185B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Smirk mouth -->
  <path d="M72 52 Q80 58 90 54" stroke="#C2185B" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- NECK -->
  <line x1="82" y1="68" x2="82" y2="88"
        stroke="url(#roseG)" stroke-width="4" stroke-linecap="round"/>

  <!-- BODY (vertical line) -->
  <line x1="82" y1="88" x2="82" y2="160"
        stroke="url(#roseG)" stroke-width="4" stroke-linecap="round"/>

  <!-- LEFT ARM (holding card/phone) -->
  <line x1="82" y1="105" x2="42" y2="135"
        stroke="url(#roseG)" stroke-width="4" stroke-linecap="round"/>
  <!-- Phone/card in left hand -->
  <rect x="20" y="130" width="24" height="32" rx="4"
        fill="none" stroke="url(#roseG)" stroke-width="3.5"/>
  <!-- Scissors icon on card -->
  <line x1="26" y1="140" x2="38" y2="152" stroke="url(#roseG)" stroke-width="2"/>
  <line x1="38" y1="140" x2="26" y2="152" stroke="url(#roseG)" stroke-width="2"/>

  <!-- RIGHT ARM (holding card) -->
  <line x1="82" y1="105" x2="120" y2="130"
        stroke="url(#roseG)" stroke-width="4" stroke-linecap="round"/>
  <!-- Card in right hand -->
  <rect x="112" y="126" width="22" height="30" rx="3"
        fill="none" stroke="url(#roseG)" stroke-width="3.5"/>
  <!-- Small icon on card -->
  <path d="M117 134 Q120 138 127 136" stroke="url(#roseG)" stroke-width="2" fill="none"/>
  <circle cx="122" cy="144" r="3" fill="none" stroke="url(#roseG)" stroke-width="2"/>

  <!-- LEGS (V shape) -->
  <line x1="82" y1="160" x2="58" y2="190"
        stroke="url(#roseG)" stroke-width="4" stroke-linecap="round"/>
  <line x1="82" y1="160" x2="106" y2="190"
        stroke="url(#roseG)" stroke-width="4" stroke-linecap="round"/>
  <!-- Feet -->
  <line x1="58" y1="190" x2="42" y2="190" stroke="url(#roseG)" stroke-width="4" stroke-linecap="round"/>
  <line x1="106" y1="190" x2="122" y2="190" stroke="url(#roseG)" stroke-width="4" stroke-linecap="round"/>

  <!-- ============================================= -->
  <!-- CENTER: Number "2"                            -->
  <!-- ============================================= -->
  <!-- Large hand-drawn style "2" -->
  <path d="M175 55
           Q178 30 210 30
           Q248 30 248 65
           Q248 90 220 110
           Q195 130 178 150
           L255 150"
        stroke="url(#darkG)" stroke-width="12" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ============================================= -->
  <!-- RIGHT STICK FIGURE (Male - Gold)              -->
  <!-- ============================================= -->

  <!-- HEAD -->
  <circle cx="330" cy="42" r="26"
          fill="none" stroke="url(#goldG)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- HAIR - shorter, straighter -->
  <path d="M310 30 Q318 16 330 18 Q342 16 350 30"
        stroke="url(#goldG)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M316 22 Q330 12 344 22"
        stroke="url(#goldG)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- FACE - happy smile -->
  <ellipse cx="320" cy="40" rx="4" ry="4.5" fill="url(#goldG)" opacity="0.9"/>
  <ellipse cx="340" cy="40" rx="4" ry="4.5" fill="url(#goldG)" opacity="0.9"/>
  <circle cx="321" cy="41" r="2" fill="#3D1500"/>
  <circle cx="341" cy="41" r="2" fill="#3D1500"/>
  <!-- Eyebrows (relaxed) -->
  <path d="M315 33 Q320 30 325 32" stroke="#E65100" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M335 32 Q340 29 345 31" stroke="#E65100" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Happy smile (bigger) -->
  <path d="M316 52 Q330 65 344 52" stroke="#E65100" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- NECK -->
  <line x1="330" y1="68" x2="330" y2="88"
        stroke="url(#goldG)" stroke-width="4" stroke-linecap="round"/>

  <!-- BODY -->
  <line x1="330" y1="88" x2="330" y2="160"
        stroke="url(#goldG)" stroke-width="4" stroke-linecap="round"/>

  <!-- LEFT ARM -->
  <line x1="330" y1="108" x2="295" y2="138"
        stroke="url(#goldG)" stroke-width="4" stroke-linecap="round"/>
  <!-- Card/receipt in left hand -->
  <rect x="274" y="133" width="24" height="32" rx="4"
        fill="none" stroke="url(#goldG)" stroke-width="3.5"/>
  <path d="M279 143 L292 143 M279 149 L292 149 M279 155 L288 155"
        stroke="url(#goldG)" stroke-width="2" stroke-linecap="round"/>

  <!-- RIGHT ARM -->
  <line x1="330" y1="108" x2="360" y2="135"
        stroke="url(#goldG)" stroke-width="4" stroke-linecap="round"/>

  <!-- LEGS (V shape) -->
  <line x1="330" y1="160" x2="306" y2="190"
        stroke="url(#goldG)" stroke-width="4" stroke-linecap="round"/>
  <line x1="330" y1="160" x2="354" y2="190"
        stroke="url(#goldG)" stroke-width="4" stroke-linecap="round"/>
  <!-- Feet -->
  <line x1="306" y1="190" x2="290" y2="190" stroke="url(#goldG)" stroke-width="4" stroke-linecap="round"/>
  <line x1="354" y1="190" x2="370" y2="190" stroke="url(#goldG)" stroke-width="4" stroke-linecap="round"/>

  <!-- ============================================= -->
  <!-- "E" Letter (Exact like the sketch - block E) -->
  <!-- ============================================= -->
  <!-- Vertical bar of E -->
  <line x1="400" y1="70" x2="400" y2="170"
        stroke="url(#goldG)" stroke-width="9" stroke-linecap="round"/>
  <!-- Top bar of E -->
  <line x1="400" y1="70" x2="445" y2="70"
        stroke="url(#goldG)" stroke-width="9" stroke-linecap="round"/>
  <!-- Middle bar of E -->
  <line x1="400" y1="120" x2="438" y2="120"
        stroke="url(#goldG)" stroke-width="9" stroke-linecap="round"/>
  <!-- Bottom bar of E -->
  <line x1="400" y1="170" x2="445" y2="170"
        stroke="url(#goldG)" stroke-width="9" stroke-linecap="round"/>

  <!-- ============================================= -->
  <!-- "G" + Arrow (like the sketch: G curves with arrow) -->
  <!-- ============================================= -->
  <!-- G shape: arc + horizontal middle bar -->
  <path d="M500 85
           Q470 72 455 95
           Q440 118 455 145
           Q470 168 498 162
           Q515 155 515 140
           L490 140"
        stroke="url(#goldG)" stroke-width="9" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow from G pointing right -->
  <line x1="515" y1="105" x2="565" y2="78"
        stroke="url(#goldG)" stroke-width="6" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="565,78 548,70 552,87"
           fill="url(#goldG)"/>

  <!-- ============================================= -->
  <!-- Brand subtitle (optional, small)             -->
  <!-- ============================================= -->
  <text x="300" y="212" font-family="Georgia, serif" font-size="11"
        fill="#C2185B" text-anchor="middle" letter-spacing="4" opacity="0.7">COSMO</text>

</svg>
