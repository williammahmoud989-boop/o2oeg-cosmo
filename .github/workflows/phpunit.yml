name: Laravel Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, pdo, pdo_sqlite, xml, ctype, json, bcmath

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php -r "file_put_contents('.env', str_replace('DB_CONNECTION=mysql', 'DB_CONNECTION=sqlite', file_get_contents('.env')));"
          php -r "file_put_contents('.env', str_replace('DB_DATABASE=mysql', 'DB_DATABASE=database/database.sqlite', file_get_contents('.env')));"

      - name: Generate application key
        run: php artisan key:generate --ansi

      - name: Run migrations
        run: php artisan migrate --force

      - name: Create storage link
        run: php artisan storage:link || true

      - name: Run tests
        run: php artisan test --no-coverage
